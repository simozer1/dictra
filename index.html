<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Voxify AI - PRO</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <style>
        /* التنسيق العام */
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0f0f0f;
            color: #e0e0e0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            min-height: 100vh;
        }

        .app-container { width: 100%; max-width: 500px; display: flex; flex-direction: column; gap: 20px; }
        h1 { text-align: center; font-size: 1.6rem; color: #bb86fc; letter-spacing: 1px; }

        /* زر التسجيل النبضي */
        .record-btn {
            background-color: #3700b3; color: white; border: none; padding: 20px;
            border-radius: 50%; font-size: 2.2rem; cursor: pointer; width: 85px; height: 85px;
            margin: 0 auto; display: flex; align-items: center; justify-content: center;
            box-shadow: 0 6px 15px rgba(0,0,0,0.4); transition: all 0.3s ease;
        }
        .record-btn.recording { background-color: #cf6679; animation: pulse 1.5s infinite; }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(207, 102, 121, 0.7); }
            70% { box-shadow: 0 0 0 20px rgba(207, 102, 121, 0); }
            100% { box-shadow: 0 0 0 0 rgba(207, 102, 121, 0); }
        }

        /* منطقة النص */
        textarea {
            width: 100%; height: 320px; background-color: #1e1e1e; color: #e0e0e0;
            border: 1px solid #333; border-radius: 15px; padding: 18px; font-size: 1.1rem;
            resize: none; line-height: 1.6; outline: none; transition: border 0.3s;
        }
        textarea:focus { border-color: #bb86fc; }

        /* أزرار التحكم */
        .action-btns { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
        .action-btn {
            background-color: #1e1e1e; color: #bb86fc; border: 1px solid #bb86fc;
            padding: 14px; border-radius: 12px; font-size: 0.9rem; cursor: pointer;
            display: flex; align-items: center; justify-content: center; gap: 8px;
            font-weight: 600; transition: 0.2s;
        }
        .action-btn:active { transform: scale(0.95); background: #bb86fc; color: #121212; }

        /* التنبيهات المنبثقة (الاحترافية) */
        #toast {
            visibility: hidden; min-width: 250px; background-color: #333; color: #fff;
            text-align: center; border-radius: 10px; padding: 16px; position: fixed;
            z-index: 1001; bottom: 30px; font-size: 0.9rem; border-left: 5px solid #bb86fc;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }
        #toast.show { visibility: visible; animation: fadein 0.5s, fadeout 0.5s 2.5s; }

        @keyframes fadein { from {bottom: 0; opacity: 0;} to {bottom: 30px; opacity: 1;} }
        @keyframes fadeout { from {bottom: 30px; opacity: 1;} to {bottom: 0; opacity: 0;} }

        /* نافذة التأكيد المخصصة (بدلاً من Confirm) */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; }
        .custom-modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #1e1e1e; padding: 25px; z-index: 1001; width: 85%; border-radius: 20px; text-align: center; border: 1px solid #444; }
        .modal-btn-confirm { background: #cf6679; color: white; border: none; padding: 12px; border-radius: 10px; cursor: pointer; width: 45%; margin: 5px; font-weight: bold; }
        .modal-btn-cancel { background: #444; color: white; border: none; padding: 12px; border-radius: 10px; cursor: pointer; width: 45%; margin: 5px; }

        #status { text-align: center; font-size: 0.85rem; color: #888; margin-top: 5px; }
        select { background: #1e1e1e; color: white; border: 1px solid #333; padding: 12px; border-radius: 10px; width: 100%; margin-bottom: 5px; outline: none; }
    </style>
</head>
<body>

    <div id="toast">تم النسخ بنجاح!</div>
    <div id="modalOverlay" class="modal-overlay"></div>
    <div id="confirmModal" class="custom-modal">
        <h3 style="margin-bottom:15px;">تأكيد المسح</h3>
        <p style="color:#aaa; margin-bottom:20px;">هل أنت متأكد من رغبتك في مسح كل النص المكتوب؟</p>
        <button class="modal-btn-confirm" onclick="executeClear()">نعم، امسح</button>
        <button class="modal-btn-cancel" onclick="hideConfirm()">إلغاء</button>
    </div>

    <div class="app-container">
        <h1>Voxify AI <i class="fas fa-headset"></i></h1>

        <select id="languageSelect">
            <option value="ar-SA">العربية (السعودية)</option>
            <option value="en-US">English (US)</option>
            <option value="fr-FR">Français</option>
        </select>

        <button id="recordBtn" class="record-btn">
            <i class="fas fa-microphone"></i>
        </button>
        <p id="status">اضغط للتحدث دون توقف</p>

        <textarea id="resultText" placeholder="ابدأ التحدث، وسيظهر نصك هنا..."></textarea>

        <div class="action-btns">
            <button onclick="copyToClipboard()" class="action-btn"><i class="fas fa-copy"></i> نسخ</button>
            <button onclick="exportToPDF()" class="action-btn"><i class="fas fa-file-pdf"></i> PDF</button>
            <button onclick="showConfirm()" class="action-btn" style="color:#cf6679; border-color:#cf6679;"><i class="fas fa-trash"></i> مسح</button>
        </div>
    </div>

    <script>
        const recordBtn = document.getElementById('recordBtn');
        const resultText = document.getElementById('resultText');
        const statusText = document.getElementById('status');
        const langSelect = document.getElementById('languageSelect');
        const toast = document.getElementById('toast');

        window.SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        let recognition;
        let isRecording = false;
        let finalTranscript = "";

        if (window.SpeechRecognition) {
            recognition = new SpeechRecognition();
            recognition.continuous = true;
            recognition.interimResults = true;

            recognition.onstart = () => {
                isRecording = true;
                recordBtn.classList.add('recording');
                recordBtn.innerHTML = '<i class="fas fa-stop"></i>';
                statusText.innerText = "أسمعك الآن... تحدث بطلاقة";
                
                finalTranscript = resultText.value;
                if (finalTranscript !== "" && !finalTranscript.endsWith(" ")) finalTranscript += " ";
            };

            recognition.onresult = (e) => {
                let interimTranscript = "";
                for (let i = e.resultIndex; i < e.results.length; i++) {
                    const transcript = e.results[i][0].transcript;
                    if (e.results[i].isFinal) {
                        finalTranscript += transcript + " ";
                    } else {
                        interimTranscript += transcript;
                    }
                }
                resultText.value = finalTranscript + interimTranscript;
                resultText.scrollTop = resultText.scrollHeight;
            };

            recognition.onend = () => {
                if (isRecording) {
                    recognition.start(); // الاستمرارية الذكية
                } else {
                    recordBtn.classList.remove('recording');
                    recordBtn.innerHTML = '<i class="fas fa-microphone"></i>';
                    statusText.innerText = "توقف التسجيل.";
                }
            };

            recognition.onerror = (e) => {
                if (e.error === 'network') showToast("خطأ في الاتصال بالإنترنت");
            };
        }

        recordBtn.addEventListener('click', () => {
            if (isRecording) {
                isRecording = false;
                recognition.stop();
            } else {
                recognition.lang = langSelect.value;
                resultText.style.direction = langSelect.value.startsWith('ar') ? 'rtl' : 'ltr';
                recognition.start();
            }
        });

        // نظام التنبيهات المخصص
        function showToast(msg) {
            toast.innerText = msg;
            toast.className = "show";
            setTimeout(() => { toast.className = toast.className.replace("show", ""); }, 3000);
        }

        function copyToClipboard() {
            if (resultText.value.trim() === "") {
                showToast("لا يوجد نص لنسخه!");
                return;
            }
            resultText.select();
            document.execCommand('copy');
            showToast("تم النسخ إلى الحافظة ✨");
        }

        // نظام الحذف المخصص
        function showConfirm() {
            document.getElementById('modalOverlay').style.display = 'block';
            document.getElementById('confirmModal').style.display = 'block';
        }

        function hideConfirm() {
            document.getElementById('modalOverlay').style.display = 'none';
            document.getElementById('confirmModal').style.display = 'none';
        }

        function executeClear() {
            resultText.value = "";
            finalTranscript = "";
            hideConfirm();
            showToast("تم مسح النص");
        }

        // تصدير PDF احترافي
        function exportToPDF() {
            if (resultText.value.trim() === "") {
                showToast("اكتب شيئاً أولاً لتصديره!");
                return;
            }
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            
            // التعامل مع اللغة العربية في PDF (تنبيه: jsPDF يحتاج خطوطاً خاصة للعربية، هنا نصدره كنص عادي)
            const lines = doc.splitTextToSize(resultText.value, 180);
            doc.text(lines, 10, 10);
            doc.save("Voxify_Note.pdf");
            showToast("جاري تحميل ملف PDF...");
        }
    </script>
</body>
</html>
