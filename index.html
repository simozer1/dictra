<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dicta PRO</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        /* Smooth transition for theme toggling */
        body, textarea, select, .action-btn, .custom-modal, .theme-toggle {
            transition: background-color 0.4s ease, color 0.4s ease, border-color 0.4s ease, box-shadow 0.4s ease;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0d0d0d;
            color: #f0f0f0;
            display: flex; flex-direction: column; align-items: center; padding: 15px; min-height: 100vh;
        }

        /* Light Mode Styles */
        body.light-mode { background-color: #f0f4f8; color: #1a1a1a; }
        body.light-mode h1 { color: #00a88f; text-shadow: 0 0 10px rgba(0, 168, 143, 0.2); }
        body.light-mode textarea { background-color: #ffffff; color: #1a1a1a; border-color: #d1d9e6; border-bottom: 4px solid #00a88f; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        body.light-mode select { background-color: #ffffff; color: #1a1a1a; border-color: #d1d9e6; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        body.light-mode .action-btn { background-color: #ffffff; color: #333; border-color: #d1d9e6; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        body.light-mode .action-btn:active { background-color: #e2e8f0; }
        body.light-mode .custom-modal { background-color: #ffffff; border-color: #00a88f; color: #1a1a1a; }
        body.light-mode #status { color: #555 !important; }
        
        .app-container { width: 100%; max-width: 500px; display: flex; flex-direction: column; gap: 15px; position: relative; }
        
        /* Theme Toggle Switch */
        .theme-toggle {
            position: absolute;
            top: 5px;
            left: 0;
            background: none;
            border: none;
            color: #00d1b2;
            font-size: 1.5rem;
            cursor: pointer;
            z-index: 10;
        }
        body.light-mode .theme-toggle { color: #00a88f; }

        h1 { text-align: center; font-size: 1.8rem; color: #00d1b2; text-shadow: 0 0 10px rgba(0,209,178,0.3); margin-top: 10px; transition: color 0.4s, text-shadow 0.4s;}

        .record-btn {
            background-color: #00d1b2; color: #0d0d0d; border: none; padding: 20px;
            border-radius: 50%; font-size: 2.2rem; cursor: pointer; width: 85px; height: 85px;
            margin: 10px auto; display: flex; align-items: center; justify-content: center;
            box-shadow: 0 0 20px rgba(0,209,178,0.2); transition: transform 0.2s ease;
        }
        
        /* Neon RGB Glow Animation for Recording State */
        .record-btn.recording { 
            animation: rgbNeonGlow 2.5s linear infinite; 
            color: white; 
        }

        @keyframes rgbNeonGlow {
            0% { box-shadow: 0 0 15px #ff0055, 0 0 30px #ff0055, inset 0 0 10px #ff0055; background-color: #ff0055; }
            25% { box-shadow: 0 0 15px #bf00ff, 0 0 30px #bf00ff, inset 0 0 10px #bf00ff; background-color: #bf00ff; }
            50% { box-shadow: 0 0 15px #00d1b2, 0 0 30px #00d1b2, inset 0 0 10px #00d1b2; background-color: #00d1b2; }
            75% { box-shadow: 0 0 15px #ffaa00, 0 0 30px #ffaa00, inset 0 0 10px #ffaa00; background-color: #ffaa00; }
            100% { box-shadow: 0 0 15px #ff0055, 0 0 30px #ff0055, inset 0 0 10px #ff0055; background-color: #ff0055; }
        }

        textarea {
            width: 100%; height: 380px; background-color: #1a1a1a; color: #ffffff;
            border: 1px solid #333; border-radius: 15px; padding: 18px; font-size: 1.15rem;
            resize: none; line-height: 1.7; outline: none; border-bottom: 4px solid #00d1b2;
        }

        .action-btns { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
        .action-btn {
            background-color: #222; color: #fff; border: 1px solid #444;
            padding: 15px; border-radius: 12px; font-size: 1rem; cursor: pointer;
            display: flex; align-items: center; justify-content: center; gap: 8px;
            font-weight: bold; 
        }
        .action-btn:active { transform: scale(0.95); background: #333; }

        #toast {
            visibility: hidden; min-width: 220px; background-color: #00d1b2; color: #000;
            text-align: center; border-radius: 30px; padding: 12px; position: fixed;
            z-index: 1001; bottom: 40px; font-weight: bold; box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }
        #toast.show { visibility: visible; animation: fadein 0.5s, fadeout 0.5s 2.5s; }

        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000; }
        .custom-modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #1a1a1a; padding: 25px; z-index: 1001; width: 85%; border-radius: 20px; text-align: center; border: 1px solid #00d1b2; }
        .modal-btn-confirm { background: #ff3860; color: white; border: none; padding: 12px; border-radius: 10px; cursor: pointer; width: 45%; margin: 5px; font-weight: bold; }
        .modal-btn-cancel { background: #444; color: white; border: none; padding: 12px; border-radius: 10px; cursor: pointer; width: 45%; margin: 5px; }

        select { background: #1a1a1a; color: white; border: 1px solid #444; padding: 14px; border-radius: 12px; width: 100%; outline: none; text-align: center; margin-bottom: 10px; font-size: 1rem; }
        
        @keyframes fadein { from {bottom: 0; opacity: 0;} to {bottom: 40px; opacity: 1;} }
        @keyframes fadeout { from {bottom: 40px; opacity: 1;} to {bottom: 0; opacity: 0;} }
    </style>
</head>
<body>

    <div id="toast">تم النسخ!</div>
    <div id="modalOverlay" class="modal-overlay"></div>
    <div id="confirmModal" class="custom-modal">
        <h3>تأكيد المسح</h3>
        <p style="color:#888; margin: 15px 0;">هل تريد مسح النص بالكامل؟</p>
        <button class="modal-btn-confirm" onclick="executeClear()">نعم</button>
        <button class="modal-btn-cancel" onclick="hideConfirm()">إلغاء</button>
    </div>

    <div class="app-container">
        <!-- Theme Toggle Button -->
        <button class="theme-toggle" onclick="toggleTheme()" title="Toggle Light/Dark Mode">
            <i class="fas fa-sun"></i>
        </button>

        <h1>Dicta <i class="fas fa-microphone-alt"></i></h1>

        <select id="languageSelect">
            <optgroup label="العربية">
                <option value="ar-MA">العربية (المغرب - الدارجة)</option>
                <option value="ar-SA" selected>العربية (الفصحى)</option>
                <option value="ar-EG">العربية (مصر)</option>
                <option value="ar-DZ">العربية (الجزائر)</option>
            </optgroup>
            <option value="fr-FR">Français</option>
            <option value="en-US">English</option>
        </select>

        <button id="recordBtn" class="record-btn"><i class="fas fa-microphone"></i></button>
        <p id="status" style="text-align:center; font-size:0.8rem; color:#888;">اضغط لبدء الإملاء</p>

        <textarea id="resultText" placeholder="النص سيظهر هنا..." autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"></textarea>

        <div class="action-btns">
            <!-- Buttons renamed to English -->
            <button onclick="copyToClipboard()" class="action-btn"><i class="fas fa-copy"></i> Copy</button>
            <button onclick="showConfirm()" class="action-btn" style="color:#ff3860; border-color:#ff3860;"><i class="fas fa-trash"></i> Delete</button>
        </div>
    </div>

    <script>
        const recordBtn = document.getElementById('recordBtn');
        const resultText = document.getElementById('resultText');
        const statusText = document.getElementById('status');
        const langSelect = document.getElementById('languageSelect');
        const toast = document.getElementById('toast');

        let recognition;
        let isRecording = false;
        let lastFinalSentence = ""; 

        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        
        if (SpeechRecognition) {
            recognition = new SpeechRecognition();
            recognition.continuous = false;
            recognition.interimResults = true;

            recognition.onresult = (event) => {
                let interimTranscript = "";
                for (let i = event.resultIndex; i < event.results.length; ++i) {
                    let transcript = event.results[i][0].transcript.trim();
                    if (event.results[i].isFinal) {
                        if (transcript !== lastFinalSentence) {
                            if (resultText.value.length > 0 && !resultText.value.endsWith(" ")) {
                                resultText.value += " ";
                            }
                            resultText.value += transcript;
                            lastFinalSentence = transcript; 
                        }
                    } else {
                        interimTranscript = transcript;
                    }
                }
            };

            recognition.onstart = () => {
                isRecording = true;
                recordBtn.classList.add('recording');
                recordBtn.innerHTML = '<i class="fas fa-stop"></i>';
                statusText.innerText = "جاري الاستماع الآن...";
            };

            recognition.onend = () => {
                if (isRecording) {
                    try { recognition.start(); } catch(e) {}
                } else {
                    recordBtn.classList.remove('recording');
                    recordBtn.innerHTML = '<i class="fas fa-microphone"></i>';
                    statusText.innerText = "توقف الإملاء.";
                }
            };

            recognition.onerror = (e) => {
                if(e.error === 'no-speech') console.log("لا يوجد صوت");
            };
        }

        recordBtn.addEventListener('click', () => {
            if (isRecording) {
                isRecording = false;
                recognition.stop();
            } else {
                recognition.lang = langSelect.value;
                resultText.style.direction = langSelect.value.startsWith('ar') ? 'rtl' : 'ltr';
                lastFinalSentence = ""; 
                recognition.start();
            }
        });

        // وظائف زر المسح المضافة للإصلاح
        function showConfirm() {
            document.getElementById('modalOverlay').style.display = 'block';
            document.getElementById('confirmModal').style.display = 'block';
        }

        function hideConfirm() {
            document.getElementById('modalOverlay').style.display = 'none';
            document.getElementById('confirmModal').style.display = 'none';
        }

        function executeClear() {
            resultText.value = "";
            lastFinalSentence = "";
            hideConfirm();
            showToast("تم مسح النص");
        }

        function copyToClipboard() {
            if (!resultText.value.trim()) { showToast("الصندوق فارغ!"); return; }
            resultText.select();
            resultText.setSelectionRange(0, 99999);
            document.execCommand('copy');
            showToast("تم النسخ بنجاح ✨");
        }

        function showToast(msg) {
            toast.innerText = msg;
            toast.className = "show";
            setTimeout(() => { toast.className = toast.className.replace("show", ""); }, 3000);
        }

        // Theme Toggle Logic
        function toggleTheme() {
            const body = document.body;
            const icon = document.querySelector('.theme-toggle i');
            
            body.classList.toggle('light-mode');
            
            if (body.classList.contains('light-mode')) {
                icon.classList.remove('fa-sun');
                icon.classList.add('fa-moon');
            } else {
                icon.classList.remove('fa-moon');
                icon.classList.add('fa-sun');
            }
        }
    </script>
      <!-- Smart Counter Feature: Words and Characters -->
<div id="smartCounter">
    <div class="counter-item">
        <span class="counter-label">WORDS</span>
        <b id="wordCount">0</b>
    </div>
    <div class="counter-divider"></div>
    <div class="counter-item">
        <span class="counter-label">CHARS</span>
        <b id="charCount">0</b>
    </div>
</div>

<style>
    /* Elegant floating bar styling */
    #smartCounter {
        position: fixed;
        bottom: 25px;
        left: 50%;
        transform: translateX(-50%);
        background: rgba(20, 20, 20, 0.65); /* Semi-transparent */
        backdrop-filter: blur(12px); /* Glassmorphism effect */
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid rgba(0, 209, 178, 0.25);
        padding: 10px 28px;
        border-radius: 100px;
        color: #00d1b2;
        font-family: 'Courier New', Courier, monospace; /* Technical feel */
        display: flex;
        align-items: center;
        gap: 20px;
        z-index: 1000;
        box-shadow: 0 12px 35px rgba(0,0,0,0.4);
        transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        pointer-events: none; /* Allows clicks to pass through if needed */
    }

    /* Light mode adaptation */
    body.light-mode #smartCounter {
        background: rgba(255, 255, 255, 0.75);
        border-color: rgba(0, 168, 143, 0.2);
        color: #008f7a;
        box-shadow: 0 8px 25px rgba(0,0,0,0.1);
    }

    .counter-item {
        display: flex;
        align-items: center;
        gap: 10px;
    }

    .counter-label {
        font-size: 10px;
        letter-spacing: 2px;
        opacity: 0.6;
        font-weight: bold;
    }

    .counter-divider {
        width: 1px;
        height: 18px;
        background: currentColor;
        opacity: 0.2;
    }

    #smartCounter b {
        font-size: 1.1rem;
        font-weight: 700;
        min-width: 25px;
        text-align: center;
    }
</style>

<script>
    (function() {
        const targetTextarea = document.getElementById('resultText');
        const wordEl = document.getElementById('wordCount');
        const charEl = document.getElementById('charCount');

        function updateSmartCounter() {
            if (!targetTextarea) return;
            
            const content = targetTextarea.value.trim();
            
            // Calculate words (handling multiple spaces/newlines)
            const words = content ? content.split(/\s+/).length : 0;
            
            // Update UI
            wordEl.innerText = words;
            charEl.innerText = targetTextarea.value.length;
        }

        // Trigger on manual typing
        targetTextarea.addEventListener('input', updateSmartCounter);

        // Trigger periodically for dictation (since voice updates happen via script)
        setInterval(updateSmartCounter, 400);
        
        // Initial call
        updateSmartCounter();
    })();
</script>
</body>
</html>
